# Linux Platform Configuration for F1r3Drive
# This file contains Linux-specific configuration properties

# Platform identification
platform.name=Linux
platform.type=linux
platform.arch=${os.arch}

# Linux kernel requirements
platform.min.kernel.version=2.6.13
platform.min.fuse.version=2.6

# FUSE configuration
fuse.enabled=true
fuse.device.path=/dev/fuse
fuse.mount.options=allow_other,default_permissions,fsname=f1r3drive,subtype=f1r3drive
fuse.max.read=131072
fuse.max.write=131072

# inotify configuration
inotify.enabled=true
inotify.max.watches=8192
inotify.events=IN_CREATE,IN_MODIFY,IN_DELETE,IN_MOVED_FROM,IN_MOVED_TO,IN_ACCESS

# Default paths
default.mount.point=${user.home}/f1r3drive
temp.directory=${java.io.tmpdir}/f1r3drive-linux
cache.directory=${user.home}/.cache/f1r3drive

# JNR-FFI configuration
jnr.ffi.enabled=true
jnr.fuse.version=0.5.8
jnr.posix.enabled=true

# Linux distribution detection
distro.detection.enabled=true
systemd.integration=true

# Container support
container.detection=true
docker.support=true
podman.support=true

# Performance tuning
thread.pool.size=6
cache.size.mb=256
placeholder.timeout.seconds=45
io.buffer.size=65536

# Security settings
selinux.compatible=true
apparmor.compatible=true
capabilities.required=CAP_SYS_ADMIN

# File system features
extended.attributes=true
symbolic.links=true
hard.links=false
file.locking=true

# Debug and logging
debug.fuse.operations=false
log.inotify.events=false
performance.monitoring=true
