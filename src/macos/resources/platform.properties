# macOS Platform Configuration for F1r3Drive
# This file contains macOS-specific configuration properties

# Platform identification
platform.name=macOS
platform.type=darwin
platform.arch=${os.arch}

# macOS version requirements
platform.min.version=10.15
platform.min.version.name=Catalina

# Native library configuration
native.library.name=libf1r3drive-fsevents.dylib
native.library.path=lib/macos
native.library.architecture=${os.arch}

# File Provider Framework configuration
fileprovider.enabled=true
fileprovider.bundle.identifier=io.f1r3fly.f1r3drive.provider
fileprovider.domain.identifier=F1r3Drive
fileprovider.display.name=F1r3Drive

# FSEvents configuration
fsevents.enabled=true
fsevents.latency=0.1
fsevents.flags=0x00000008

# Default paths
default.mount.point=${user.home}/F1r3Drive
temp.directory=${java.io.tmpdir}/f1r3drive-macos
cache.directory=${user.home}/Library/Caches/F1r3Drive

# macOS-specific features
spotlight.indexing=true
quicklook.enabled=true
finder.integration=true

# Performance tuning
thread.pool.size=4
cache.size.mb=128
placeholder.timeout.seconds=30

# Security settings
sandbox.compatible=true
notarization.ready=true
keychain.integration=true
